apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: feature-flags
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "flaguser"
            - name: POSTGRES_PASSWORD
              value: "flagpass"
            - name: POSTGRES_DB
              value: "flags"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: feature-flags
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432