apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: feature-flags
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      serviceAccountName: flag-service-sa
      containers:
        - name: evaluation-service
          image: evaluation-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flag-service-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: feature-flags
spec:
  selector:
    app: evaluation-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
