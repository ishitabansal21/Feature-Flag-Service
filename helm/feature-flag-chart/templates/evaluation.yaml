apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.evaluationService.replicas }}
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      serviceAccountName: flag-service-sa
      containers:
        - name: evaluation-service
          image: {{ .Values.evaluationService.image.repository }}:{{ .Values.evaluationService.image.tag }}
          imagePullPolicy: {{ .Values.evaluationService.image.pullPolicy }}
          ports:
            - containerPort: 8001
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flag-service-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.evaluationService.resources.requests.cpu }}
              memory: {{ .Values.evaluationService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.evaluationService.resources.limits.cpu }}
              memory: {{ .Values.evaluationService.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: evaluation-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
