apiVersion: v1
kind: ServiceAccount
metadata:
  name: flag-service-sa
  namespace: feature-flags
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flag-service-role
  namespace: feature-flags
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flag-service-rolebinding
  namespace: feature-flags
subjects:
  - kind: ServiceAccount
    name: flag-service-sa
    namespace: feature-flags
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: flag-service-role